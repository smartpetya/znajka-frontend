<html lang="ru">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; -webkit-tap-highlight-color: transparent; }
    input, button { -webkit-appearance: none; }
    :root {
      --bg:#f5f0e8;--card:rgba(255,255,255,0.85);--card-border:rgba(180,140,60,0.2);
      --text:#2c2416;--text2:rgba(44,36,22,0.6);--text3:rgba(44,36,22,0.35);
      --accent:#c8860a;--accent2:#e6a020;--btn-text:#fff;
      --input-bg:rgba(255,255,255,0.7);--input-border:rgba(180,140,60,0.3);
      --progress-bg:rgba(0,0,0,0.08);--opt-bg:rgba(0,0,0,0.03);--opt-border:rgba(0,0,0,0.1);
      --chip-bg:rgba(200,134,10,0.08);--chip-border:rgba(200,134,10,0.25);--chip-text:#a06808;
      --stat-bg:rgba(0,0,0,0.04);--badge-bg:rgba(200,134,10,0.1);--badge-border:rgba(200,134,10,0.3);
      --shadow:0 4px 20px rgba(0,0,0,0.07);--green:#3a9a5a;--red:#e05555;
    }
    [data-theme="dark"] {
      --bg:#0a0820;--card:rgba(255,255,255,0.045);--card-border:rgba(245,200,66,0.18);
      --text:#ede6d3;--text2:rgba(237,230,211,0.6);--text3:rgba(237,230,211,0.35);
      --accent:#f5c842;--accent2:#d98d18;--btn-text:#180800;
      --input-bg:rgba(255,255,255,0.06);--input-border:rgba(245,200,66,0.28);
      --progress-bg:rgba(255,255,255,0.08);--opt-bg:rgba(255,255,255,0.03);--opt-border:rgba(255,255,255,0.1);
      --chip-bg:rgba(245,200,66,0.07);--chip-border:rgba(245,200,66,0.22);--chip-text:#c8b660;
      --stat-bg:rgba(255,255,255,0.04);--badge-bg:rgba(245,200,66,0.1);--badge-border:rgba(245,200,66,0.25);
      --shadow:0 4px 24px rgba(0,0,0,0.3);--green:#50c878;--red:#ff8080;
    }
    body{background:var(--bg);color:var(--text);font-family:Georgia,serif;transition:background .3s,color .3s;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    @keyframes xpFill{from{width:0}to{width:var(--xp-pct)}}
    .fadein{animation:fadeIn .35s ease both}
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:20px;backdrop-filter:blur(12px);box-shadow:var(--shadow)}
    .pbtn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--btn-text);border:none;border-radius:50px;padding:13px 28px;font-size:16px;font-family:'Playfair Display',serif;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
    .pbtn:active{transform:scale(0.97);opacity:.88}
    .pbtn:disabled{opacity:.5;cursor:not-allowed}
    .sbtn{background:transparent;color:var(--accent);border:1px solid var(--card-border);border-radius:50px;padding:10px 20px;font-size:14px;font-family:Georgia,serif;cursor:pointer}
    .zinput{background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:16px;outline:none;width:100%;font-family:Georgia,serif;transition:border-color .2s}
    .zinput:focus{border-color:var(--accent)}
    .zinput::placeholder{color:var(--text3)}
    .opt{width:100%;text-align:left;padding:13px 16px;border-radius:12px;border:1px solid var(--opt-border);background:var(--opt-bg);color:var(--text);font-size:15px;cursor:pointer;margin-bottom:9px;display:block;font-family:Georgia,serif}
    .opt-ok{background:rgba(70,190,110,.2)!important;border-color:#46be6e!important}
    .opt-no{background:rgba(210,70,70,.2)!important;border-color:#d24646!important}
    .chip{background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:30px;padding:7px 15px;font-size:13px;cursor:pointer;color:var(--chip-text);display:inline-block;margin:3px;user-select:none}
    .badge{display:inline-flex;align-items:center;gap:6px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:20px;padding:6px 13px;font-size:13px;color:var(--accent);margin:3px}
    .stat-row{background:var(--stat-bg);border:1px solid var(--card-border);border-radius:12px;padding:13px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .subject-pill{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:50px;cursor:pointer;border:1px solid var(--card-border);background:var(--card);white-space:nowrap;font-family:Georgia,serif;font-size:14px;color:var(--text2);flex-shrink:0;user-select:none}
    .subject-pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:var(--btn-text)}
    .theme-btn{background:var(--card);border:1px solid var(--card-border);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
    .drag-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;cursor:grab;user-select:none}
    .drag-scroll:active{cursor:grabbing}
    .drag-scroll::-webkit-scrollbar{display:none}

    /* XP Bar */
    .xp-bar{height:6px;background:var(--progress-bg);border-radius:3px;overflow:hidden;margin-top:6px}
    .xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .8s ease}

    /* Голосовая кнопка */
    .voice-btn{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(200,134,10,0.4);transition:transform .2s,box-shadow .2s;flex-shrink:0}
    .voice-btn:active{transform:scale(0.93)}
    .voice-btn.listening{animation:pulse 1s infinite;box-shadow:0 4px 30px rgba(200,134,10,0.7)}
    .voice-btn.disabled{opacity:.4;cursor:not-allowed}

    /* Level up popup */
    .levelup-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:2px solid var(--accent);border-radius:24px;padding:32px;text-align:center;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,0.3);backdrop-filter:blur(20px);min-width:260px}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--card-border);backdrop-filter:blur(16px);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--text3);font-size:11px;font-family:Georgia,serif;background:none;border:none}
    .nav-item.active{color:var(--accent)}
    .nav-item span:first-child{font-size:22px}
    .photo-drop{border:2px dashed var(--input-border);border-radius:16px;padding:36px 20px;text-align:center;cursor:pointer;background:var(--input-bg)}
    .scroll-wrap{padding:16px 16px 88px;max-width:600px;margin:0 auto}
    .desktop-tabs{display:none}
    @media(min-width:600px){
      .bottom-nav{display:none!important}.scroll-wrap{padding-bottom:24px}
      .desktop-tabs{display:flex;gap:4px;border-bottom:1px solid var(--card-border);padding:0 16px;background:var(--card);backdrop-filter:blur(14px);max-width:100%}
      .dtab{padding:12px 18px;font-size:14px;font-family:Georgia,serif;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);transition:all .2s;white-space:nowrap}
      .dtab.active{color:var(--accent);border-bottom-color:var(--accent)}
    }
    @media(max-width:599px){.desktop-only{display:none!important}}
  </style>
</head>

<script type="text/babel">

  const SUBJECTS = [
    {id:"math",  emoji:"🔢",name:"Математика", hints:["Теорема Пифагора","Дроби","Квадратные уравнения","Геометрия"]},

  const NAV_ITEMS = [{id:"home",icon:"📚",label:"Учиться"},{id:"plans",icon:"🗺️",label:"Планы"},{id:"voice",icon:"🎤",label:"Голос"},{id:"homework",icon:"📸",label:"Фото ДЗ"},{id:"cabinet",icon:"👤",label:"Кабинет"}];

  function tryLS(fn,fb=null){try{return fn();}catch{return fb;}}

  function useDragScroll(){
    const ref=React.useRef();
    const down=React.useRef(false);
    const startX=React.useRef(0);
    const scrollLeft=React.useRef(0);
    const onMouseDown=e=>{down.current=true;startX.current=e.pageX-ref.current.offsetLeft;scrollLeft.current=ref.current.scrollLeft;ref.current.style.cursor='grabbing';};
    const onMouseUp=()=>{down.current=false;if(ref.current)ref.current.style.cursor='grab';};
    const onMouseMove=e=>{if(!down.current||!ref.current)return;e.preventDefault();const x=e.pageX-ref.current.offsetLeft;ref.current.scrollLeft=scrollLeft.current-(x-startX.current);};
    return{ref,onMouseDown,onMouseUp,onMouseLeave:onMouseUp,onMouseMove};
  }

  function AuthWrap({children, theme, setTheme}){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}}>
        <div style={{width:"100%",maxWidth:420}}>

            <div style={{fontSize:52}}>🦉</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:900,margin:"6px 0 0",color:"var(--accent)"}}>Знайка</h1>
            <p style={{fontStyle:"italic",color:"var(--text3)",fontSize:13,margin:"4px 0 0"}}>твой личный репетитор</p>
          </div>
          {children}
          <div style={{textAlign:"center",marginTop:16}}>
            <button className="theme-btn" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")} style={{margin:"0 auto"}}>{theme==="dark"?"☀️":"🌙"}</button>
          </div>
        </div>
      </div>
    );
  }

    function App(){
    const [theme,setTheme]=React.useState(()=>tryLS(()=>localStorage.getItem("znajka_theme")||"dark","dark"));
    const [token,setToken]=React.useState(()=>tryLS(()=>{const s=JSON.parse(localStorage.getItem("znajka_session"));return s?.session?.access_token||null;},null));
    const [page,setPage]=React.useState(()=>{
      if(window.location.hash.includes("type=recovery"))return "newpassword";
      const s=tryLS(()=>JSON.parse(localStorage.getItem("znajka_session")));
      return s?.session?.access_token?"home":"auth";
    });
    const [user,setUser]=React.useState(()=>tryLS(()=>{const s=JSON.parse(localStorage.getItem("znajka_session"));return s?.user||null;},null));

    const [authMode,setAuthMode]=React.useState("login");
    const [authForm,setAuthForm]=React.useState({name:"",email:"",password:"",birthdate:"",day:"",month:"",year:""});
    const [emailSent,setEmailSent]=React.useState(false);
    const [registeredEmail,setRegisteredEmail]=React.useState("");
    const [authError,setAuthError]=React.useState("");
    const [authLoading,setAuthLoading]=React.useState(false);

    const [resetEmail,setResetEmail]=React.useState("");
    const [resetSent,setResetSent]=React.useState(false);
    const [resetLoading,setResetLoading]=React.useState(false);
    const [resetError,setResetError]=React.useState("");
    const [newPass,setNewPass]=React.useState("");
    const [newPassConfirm,setNewPassConfirm]=React.useState("");
    const [newPassLoading,setNewPassLoading]=React.useState(false);
    const [newPassError,setNewPassError]=React.useState("");
    const [newPassDone,setNewPassDone]=React.useState(false);

    const [subject,setSubject]=React.useState(null);
    const [topic,setTopic]=React.useState("");
    const [data,setData]=React.useState(null);
    const [error,setError]=React.useState(null);
    const [secIdx,setSecIdx]=React.useState(0);
    const [typeDone,setTypeDone]=React.useState(false);
    const [displayed,setDisplayed]=React.useState("");
    const [quizStep,setQuizStep]=React.useState(0);
    const [selected,setSelected]=React.useState(null);
    const [answers,setAnswers]=React.useState([]);
    const [score,setScore]=React.useState(0);
    const [stats,setStats]=React.useState(null);
    const [levelUpData,setLevelUpData]=React.useState(null);
    const [streakData,setStreakData]=React.useState(null);
    const [subscription,setSubscription]=React.useState(null);
    const [children,setChildren]=React.useState(null);
    const [childEmail,setChildEmail]=React.useState("");
    const [addChildLoading,setAddChildLoading]=React.useState(false);
    const [addChildMsg,setAddChildMsg]=React.useState("");
    const [limitError,setLimitError]=React.useState("");
    const [plans,setPlans]=React.useState(null);
    const [planTopic,setPlanTopic]=React.useState("");
    const [planLoading,setPlanLoading]=React.useState(false);
    const [planError,setPlanError]=React.useState("");
    const [activePlan,setActivePlan]=React.useState(null);

    // Голос
    const [voiceState,setVoiceState]=React.useState("idle"); // idle | listening | thinking | speaking
    const [voiceText,setVoiceText]=React.useState("");
    const [voiceAnswer,setVoiceAnswer]=React.useState("");
    const [voiceHistory,setVoiceHistory]=React.useState([]);
    const [voiceSupported,setVoiceSupported]=React.useState(true);
    const recognitionRef=React.useRef(null);
    const synthRef=React.useRef(window.speechSynthesis);

    // Фото
    const [hwImage,setHwImage]=React.useState(null);
    const [hwResult,setHwResult]=React.useState(null);
    const [hwLoading,setHwLoading]=React.useState(false);
    const [hwError,setHwError]=React.useState("");
    const fileRef=React.useRef();
    const tokenRef=React.useRef(token);
    React.useEffect(()=>{tokenRef.current=token;},[token]);

    // ── Авто-обновление токена через Supabase ──
    React.useEffect(()=>{
      // Слушаем обновление сессии от Supabase
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, session)=>{
        if(event==="TOKEN_REFRESHED" && session){
          const tk=session.access_token;
          setToken(tk);
          tryLS(()=>{
            const saved=JSON.parse(localStorage.getItem("znajka_session")||"null");
            if(saved) localStorage.setItem("znajka_session",JSON.stringify({...saved,session}));
          });
        }
        if(event==="SIGNED_OUT"){
          setToken(null);setUser(null);setPage("auth");
          tryLS(()=>localStorage.removeItem("znajka_session"));
        }
      });
      // При старте — пробуем обновить сессию если токен есть
      const saved=tryLS(()=>JSON.parse(localStorage.getItem("znajka_session")));
      if(saved?.session?.refresh_token){
        sb.auth.setSession({
          access_token: saved.session.access_token,
          refresh_token: saved.session.refresh_token
        }).then(({data,error})=>{
          if(data?.session){
            const tk=data.session.access_token;
            setToken(tk);
            tryLS(()=>localStorage.setItem("znajka_session",JSON.stringify({session:data.session,user:data.user||saved.user})));
          }
        });
      }
      return ()=>subscription.unsubscribe();
    },[]);

    const subjectScroll=useDragScroll();

    React.useEffect(()=>{
      document.documentElement.setAttribute("data-theme",theme);
      tryLS(()=>localStorage.setItem("znajka_theme",theme));
    },[theme]);

    React.useEffect(()=>{
      if(token){ loadSubscription(); }
    },[token]);

    React.useEffect(()=>{
      // Проверяем поддержку голоса
      if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
        setVoiceSupported(false);
      }
    },[]);

    React.useEffect(()=>{
      if(page!=="learn"||!data)return;
      const text=data.sections[secIdx].text;
      let i=0;setDisplayed("");setTypeDone(false);
      const t=setInterval(()=>{if(i<text.length)setDisplayed(text.slice(0,++i));else{clearInterval(t);setTypeDone(true);}},18);
      return()=>clearInterval(t);
    },[page,secIdx,data]);

    const apiFetch=React.useCallback(async(path,opts={})=>{
      const tk=tokenRef.current;
      const headers={"Content-Type":"application/json",...(tk?{Authorization:`Bearer ${tk}`}:{}),...(opts.headers||{})};
      const res=await fetch(`${API_URL}${path}`,{...opts,headers});
      return res.json();
    },[]);

    const saveAndLogin=(session,usr)=>{
      const tk=session?.access_token||null;
      setToken(tk);setUser(usr);
      tryLS(()=>localStorage.setItem("znajka_session",JSON.stringify({session,user:usr})));
      setPage("home");
    };
    const logout=()=>{setToken(null);setUser(null);tryLS(()=>localStorage.removeItem("znajka_session"));setPage("auth");};

    const handleAuth=async()=>{
      setAuthError("");setAuthLoading(true);
      try{
        if(authMode==="register"){
          if(!authForm.name||!authForm.email||!authForm.password)throw new Error("Заполни все поля");
          // Собираем дату рождения из трёх полей
          let birthdate = null;
          if(authForm.day&&authForm.month&&authForm.year){
            birthdate = `${authForm.year}-${String(authForm.month).padStart(2,"0")}-${String(authForm.day).padStart(2,"0")}`;
          }
          const json=await apiFetch("/api/auth/register",{method:"POST",body:JSON.stringify({
            name:authForm.name,email:authForm.email,password:authForm.password,
            birthdate,role:"student"
          })});
          if(!json.success)throw new Error(json.error);
          // Показываем экран подтверждения email
          setRegisteredEmail(authForm.email);
          setEmailSent(true);
        }else{
          if(!authForm.email||!authForm.password)throw new Error("Введи email и пароль");
          const json=await apiFetch("/api/auth/login",{method:"POST",body:JSON.stringify({email:authForm.email,password:authForm.password})});
          if(!json.success)throw new Error(json.error);
          saveAndLogin(json.session,json.user);
        }
      }catch(err){setAuthError(err.message);}
      setAuthLoading(false);
    };

    const handleResetRequest=async()=>{
      if(!resetEmail.trim()){setResetError("Введи email");return;}
      setResetLoading(true);setResetError("");
      const {error}=await sb.auth.resetPasswordForEmail(resetEmail,{redirectTo:"https://smartpetya.github.io/znajka-frontend"});
      if(error)setResetError(error.message);else setResetSent(true);
      setResetLoading(false);
    };

    const handleNewPassword=async()=>{
      if(!newPass||newPass.length<6){setNewPassError("Пароль минимум 6 символов");return;}
      if(newPass!==newPassConfirm){setNewPassError("Пароли не совпадают");return;}
      setNewPassLoading(true);setNewPassError("");
      const {error}=await sb.auth.updateUser({password:newPass});
      if(error)setNewPassError(error.message);
      else{setNewPassDone(true);setTimeout(()=>setPage("auth"),2500);}
      setNewPassLoading(false);
    };

    const loadPlans=async()=>{
      setPlans(null);
      const json=await apiFetch("/api/plans");
      if(json.success) setPlans(json.plans);
    };

    const createPlan=async()=>{
      if(!planTopic.trim()) return;
      setPlanLoading(true); setPlanError("");
      const json=await apiFetch("/api/plans/create",{method:"POST",body:JSON.stringify({title:planTopic,subject:subject?.name||null})});
      if(json.success){ setActivePlan(json.plan); loadPlans(); setPlanTopic(""); }
      else setPlanError(json.error||"Ошибка");
      setPlanLoading(false);
    };

    const completeTopic=async(planId,topicTitle)=>{
      const json=await apiFetch(`/api/plans/${planId}/complete`,{method:"POST",body:JSON.stringify({topicTitle})});
      if(json.success){
        setActivePlan(p=>({...p,completed_topics:json.completed}));
        loadPlans();
      }
    };

    const deletePlan=async(planId)=>{
      await apiFetch(`/api/plans/${planId}`,{method:"DELETE"});
      setActivePlan(null); loadPlans();
    };

    const loadSubscription=async()=>{
      const json=await apiFetch("/api/subscription");
      if(json.success) setSubscription(json);
    };

    const loadChildren=async()=>{
      setChildren(null);
      const json=await apiFetch("/api/parent/children");
      if(json.success) setChildren(json.children);
    };

    const addChild=async()=>{
      if(!childEmail.trim()) return;
      setAddChildLoading(true); setAddChildMsg("");
      const json=await apiFetch("/api/parent/add-child",{method:"POST",body:JSON.stringify({childEmail:childEmail.trim()})});
      if(json.success){setAddChildMsg("✅ Ребёнок добавлен!");setChildEmail("");loadChildren();}
      else setAddChildMsg("❌ "+json.error);
      setAddChildLoading(false);
    };

    const activatePremium=async()=>{
      await apiFetch("/api/subscription/activate",{method:"POST"});
      loadSubscription(); loadStats();
      alert("🎉 Premium активирован!");
    };

    const loadStats=async()=>{
      setStats(null);
      const json=await apiFetch("/api/profile/stats");
      if(json.success)setStats(json);
    };

    const start=async()=>{
      if(!topic.trim())return;
      setPage("loading");setError(null);
      try{
        const json=await apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic,subject:subject?.name||null})});
        if(!json.success){
          if(json.limitReached){setLimitError(json.error);setPage("home");return;}
          throw new Error(json.error);
        }
        setData({...json.data,topic});setSecIdx(0);setPage("learn");
      }catch(err){setError("Ошибка: "+err.message);setPage("home");}
    };

    const nextSection=()=>{
      if(secIdx<data.sections.length-1)setSecIdx(secIdx+1);
      else{setPage("quiz");setQuizStep(0);setAnswers([]);setSelected(null);}
    };

    const answer=async(idx)=>{
      if(selected!==null)return;
      setSelected(idx);
      const correct=idx===data.quiz[quizStep].correct;
      const newAns=[...answers,correct];setAnswers(newAns);
      setTimeout(async()=>{
        if(quizStep<data.quiz.length-1){setQuizStep(quizStep+1);setSelected(null);}
        else{
          const fs=newAns.filter(Boolean).length;
          setScore(fs);
          const res=await apiFetch("/api/progress",{method:"POST",body:JSON.stringify({topic:data.topic,score:fs})});
          if(res.levelUp&&res.newLevel){
            setLevelUpData(res.newLevel);
            setTimeout(()=>setLevelUpData(null),3500);
          }
          if(res.streak>1) setStreakData({streak:res.streak,bonus:res.streakBonus,xp:res.earnedXP});
          else setStreakData({streak:1,bonus:0,xp:res.earnedXP});
          setPage("result");
        }
      },900);
    };

    const resetLearn=()=>{setPage("home");setTopic("");setData(null);setError(null);};

    // ── ГОЛОС ──
    const startListening=()=>{
      if(!voiceSupported||voiceState!=="idle")return;
      const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
      const recognition=new SpeechRecognition();
      recognition.lang="ru-RU";
      recognition.interimResults=false;
      recognition.maxAlternatives=1;
      recognition.continuous=false;
      recognitionRef.current=recognition;

      recognition.onstart=()=>{ console.log("🎤 Слушаю..."); setVoiceState("listening"); };
      recognition.onresult=async(e)=>{
        const text=e.results[0][0].transcript;
        console.log("✅ Распознано:",text);
        setVoiceText(text);
        setVoiceState("thinking");
        setVoiceHistory(h=>[...h,{role:"user",text}]);
        try{
          const json=await apiFetch("/api/voice",{method:"POST",body:JSON.stringify({text,subject:subject?.name||null})});
          if(json.success){
            setVoiceAnswer(json.answer);
            setVoiceHistory(h=>[...h,{role:"assistant",text:json.answer}]);
            setVoiceState("speaking");
            if(synthRef.current){
              synthRef.current.cancel();
              const utt=new SpeechSynthesisUtterance(json.answer);
              utt.lang="ru-RU"; utt.rate=0.95;
              utt.onend=()=>setVoiceState("idle");
              synthRef.current.speak(utt);
            }else setVoiceState("idle");
          }else{ console.error("API:",json.error); setVoiceState("idle"); }
        }catch(err){ console.error("Ошибка:",err); setVoiceState("idle"); }
      };
      recognition.onerror=(e)=>{ console.error("🚨 Ошибка mic:",e.error); setVoiceState("idle"); };
      recognition.onnomatch=()=>{ console.log("🔇 Не распознано"); setVoiceState("idle"); };
      recognition.onend=()=>{ console.log("⏹ Запись закончена"); };
      recognition.start();
    };

    const stopListening=()=>{
      recognitionRef.current?.stop();
      synthRef.current?.cancel();
      setVoiceState("idle");
    };

    const handleFile=(file)=>{
      if(!file||!file.type.startsWith("image/"))return;
      const reader=new FileReader();
      reader.onload=e=>{setHwImage(e.target.result);setHwResult(null);setHwError("");};
      reader.readAsDataURL(file);
    };

    const analyzeHw=async()=>{
      if(!hwImage)return;
      setHwLoading(true);setHwError("");
      try{
        const base64=hwImage.split(",")[1];const mediaType=hwImage.split(";")[0].split(":")[1];
        const res=await fetch(`${API_URL}/api/homework`,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${tokenRef.current}`},body:JSON.stringify({image:base64,mediaType})});
        const json=await res.json();
        if(!json.success)throw new Error(json.error);
        setHwResult(json.result);
      }catch(err){setHwError("Ошибка: "+err.message);}
      setHwLoading(false);
    };

    const hints=subject?subject.hints:["Фотосинтез","Теорема Пифагора","Динозавры","Чёрные дыры","ДНК","Вулканы"];
    const isAuthPage=["auth","reset","newpassword"].includes(page);
    const showNav=!isAuthPage;

    const L=({c})=><label style={{fontSize:11,color:"var(--text3)",marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:1}}>{c}</label>;



    return(
      <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"Georgia,serif",transition:"background .3s,color .3s"}}>

        {/* LEVEL UP POPUP */}
        {levelUpData&&(
          <div className="levelup-popup fadein">
            <div style={{fontSize:52,marginBottom:8}}>{levelUpData.emoji}</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",color:"var(--accent)",margin:"0 0 6px",fontSize:22}}>Новый уровень!</h2>
            <p style={{color:"var(--text2)",fontSize:16,margin:0}}>{levelUpData.title}</p>
          </div>
        )}

        {/* AUTH */}
        {page==="auth"&&(
          <AuthWrap theme={theme} setTheme={setTheme}>
            <div className="card fadein" style={{padding:26}}>
              <div style={{display:"flex",marginBottom:20,background:"var(--stat-bg)",borderRadius:12,padding:4}}>
                {["login","register"].map(m=>(
                  <button key={m} onClick={()=>{setAuthMode(m);setAuthError("");}}
                    style={{flex:1,padding:"9px",border:"none",borderRadius:10,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:14,
                      background:authMode===m?"var(--badge-bg)":"transparent",color:authMode===m?"var(--accent)":"var(--text3)"}}>
                    {m==="login"?"Войти":"Регистрация"}
                  </button>
                ))}
              </div>
              {authError&&<p style={{color:"var(--red)",fontSize:13,marginBottom:12,textAlign:"center"}}>{authError}</p>}
              <div style={{display:"flex",flexDirection:"column",gap:13}}>
                {authMode==="register"&&<>
                  <div><L c="Имя"/><input className="zinput" placeholder="Как тебя зовут?" value={authForm.name} onChange={e=>setAuthForm({...authForm,name:e.target.value})}/></div>
                  <div>
                    <L c="Дата рождения"/>
                    <div style={{display:"flex",gap:8}}>
                      <select className="zinput" value={authForm.day} onChange={e=>setAuthForm({...authForm,day:e.target.value})} style={{flex:1,cursor:"pointer"}}>
                        <option value="">День</option>
                        {Array.from({length:31},(_,i)=><option key={i+1} value={i+1}>{i+1}</option>)}
                      </select>
                      <select className="zinput" value={authForm.month} onChange={e=>setAuthForm({...authForm,month:e.target.value})} style={{flex:1.5,cursor:"pointer"}}>
                        <option value="">Месяц</option>
                        {["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"].map((m,i)=><option key={i+1} value={i+1}>{m}</option>)}
                      </select>
                      <select className="zinput" value={authForm.year} onChange={e=>setAuthForm({...authForm,year:e.target.value})} style={{flex:1.2,cursor:"pointer"}}>
                        <option value="">Год</option>
                        {Array.from({length:80},(_,i)=>{const y=new Date().getFullYear()-i;return<option key={y} value={y}>{y}</option>})}
                      </select>
                    </div>
                    <p style={{fontSize:11,color:"var(--text3)",margin:"4px 0 0"}}>Адаптируем объяснения под твой возраст</p>
                  </div>
                </>}
                <div><L c="Email"/><input className="zinput" placeholder="твой@email.ru" type="email" value={authForm.email} onChange={e=>setAuthForm({...authForm,email:e.target.value})}/></div>
                <div><L c="Пароль"/><input className="zinput" placeholder="••••••••" type="password" value={authForm.password} onChange={e=>setAuthForm({...authForm,password:e.target.value})} onKeyDown={e=>e.key==="Enter"&&handleAuth()}/></div>
                <button className="pbtn" style={{width:"100%",marginTop:4}} onClick={handleAuth} disabled={authLoading}>
                  {authLoading?"⏳ Подождите...":authMode==="login"?"Войти →":"Создать аккаунт →"}
                </button>
                {authMode==="login"&&(
                  <button onClick={()=>{setPage("reset");setResetSent(false);setResetError("");setResetEmail("");}}
                    style={{background:"none",border:"none",color:"var(--text3)",fontSize:13,cursor:"pointer",textAlign:"center",padding:"4px 0"}}>
                    Забыл пароль?
                  </button>
                )}
              </div>
            </div>
          </AuthWrap>
        )}

        {/* ПОДТВЕРЖДЕНИЕ EMAIL */}
        {page==="auth"&&emailSent&&(
          <AuthWrap theme={theme} setTheme={setTheme}>
            <div className="card fadein" style={{padding:32,textAlign:"center"}}>
              <div style={{fontSize:56,marginBottom:12}}>📬</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 12px"}}>Подтверди почту</h2>
              <p style={{color:"var(--text2)",fontSize:15,lineHeight:1.7,margin:"0 0 20px"}}>
                Мы отправили письмо на<br/><strong style={{color:"var(--accent)"}}>{registeredEmail}</strong><br/>
                Открой письмо и нажми кнопку подтверждения
              </p>
              <div style={{background:"var(--stat-bg)",borderRadius:12,padding:"14px 16px",marginBottom:20,fontSize:13,color:"var(--text3)",textAlign:"left"}}>
                <p style={{margin:"0 0 6px"}}>📩 Не пришло письмо?</p>
                <p style={{margin:0}}>Проверь папку <strong>Спам</strong> или подожди пару минут</p>
              </div>
              <button className="pbtn" style={{width:"100%",marginBottom:10}} onClick={()=>{setEmailSent(false);setAuthMode("login");setAuthForm({name:"",email:registeredEmail,password:"",day:"",month:"",year:""});}}>
                Уже подтвердил → Войти
              </button>
              <button onClick={()=>setEmailSent(false)} style={{background:"none",border:"none",color:"var(--text3)",fontSize:13,cursor:"pointer"}}>
                ← Назад
              </button>
            </div>
          </AuthWrap>
        )}

        {/* СБРОС ПАРОЛЯ */}
        {page==="reset"&&(
          <AuthWrap theme={theme} setTheme={setTheme}>
            <div className="card fadein" style={{padding:26}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 12px"}}>🔑 Сброс пароля</h2>
              {!resetSent?(
                <div style={{display:"flex",flexDirection:"column",gap:13}}>
                  <p style={{color:"var(--text2)",fontSize:14,margin:0}}>Введи email — пришлём ссылку.</p>
                  {resetError&&<p style={{color:"var(--red)",fontSize:13,margin:0}}>{resetError}</p>}
                  <div><L c="Email"/><input className="zinput" placeholder="твой@email.ru" type="email" value={resetEmail} onChange={e=>setResetEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleResetRequest()}/></div>
                  <button className="pbtn" style={{width:"100%"}} onClick={handleResetRequest} disabled={resetLoading}>{resetLoading?"⏳ Отправляю...":"Отправить ссылку →"}</button>
                  <button onClick={()=>setPage("auth")} style={{background:"none",border:"none",color:"var(--text3)",fontSize:13,cursor:"pointer",textAlign:"center"}}>← Вернуться</button>
                </div>
              ):(
                <div style={{textAlign:"center",padding:"10px 0"}}>
                  <div style={{fontSize:48,marginBottom:12}}>📬</div>
                  <p style={{color:"var(--text2)",fontSize:15,lineHeight:1.6}}>Письмо отправлено на <strong style={{color:"var(--accent)"}}>{resetEmail}</strong></p>
                  <button className="sbtn" style={{marginTop:20}} onClick={()=>setPage("auth")}>← Войти</button>
                </div>
              )}
            </div>
          </AuthWrap>
        )}

        {/* НОВЫЙ ПАРОЛЬ */}
        {page==="newpassword"&&(
          <AuthWrap theme={theme} setTheme={setTheme}>
            <div className="card fadein" style={{padding:26}}>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 12px"}}>🔐 Новый пароль</h2>
              {!newPassDone?(
                <div style={{display:"flex",flexDirection:"column",gap:13}}>
                  {newPassError&&<p style={{color:"var(--red)",fontSize:13,margin:0}}>{newPassError}</p>}
                  <div><L c="Новый пароль"/><input className="zinput" placeholder="Минимум 6 символов" type="password" value={newPass} onChange={e=>setNewPass(e.target.value)}/></div>
                  <div><L c="Повтори пароль"/><input className="zinput" placeholder="Ещё раз..." type="password" value={newPassConfirm} onChange={e=>setNewPassConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleNewPassword()}/></div>
                  <button className="pbtn" style={{width:"100%"}} onClick={handleNewPassword} disabled={newPassLoading}>{newPassLoading?"⏳ Сохраняю...":"Сохранить →"}</button>
                </div>
              ):(
                <div style={{textAlign:"center",padding:"10px 0"}}>
                  <div style={{fontSize:48,marginBottom:12}}>✅</div>
                  <p style={{color:"var(--text2)",fontSize:15}}>Пароль изменён! Перенаправляю...</p>
                </div>
              )}
            </div>
          </AuthWrap>
        )}

        {/* ШАПКА */}
        {!isAuthPage&&(
          <div style={{position:"sticky",top:0,zIndex:50,background:"var(--card)",borderBottom:"1px solid var(--card-border)",backdropFilter:"blur(14px)"}}>
            <div style={{maxWidth:600,margin:"0 auto",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setPage("home")}>
                <span style={{fontSize:26}}>🦉</span>
                <span style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,color:"var(--accent)"}}>Знайка</span>
              </div>
              <button className="theme-btn" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>{theme==="dark"?"☀️":"🌙"}</button>
            </div>
            <div style={{maxWidth:600,margin:"0 auto"}}>
              <div className="desktop-tabs">
                {NAV_ITEMS.map(item=>(
                  <button key={item.id} className={`dtab${page===item.id?" active":""}`} onClick={()=>{
                    setPage(item.id);
                    if(item.id==="cabinet")loadStats();
                    if(item.id==="parent"){loadChildren();loadSubscription();}
                  }}>
                    {item.icon} {item.label}
                  </button>
                ))}
                <div style={{flex:1}}/>
                <button className="dtab" onClick={logout} style={{color:"var(--text3)"}}>Выйти</button>
              </div>
            </div>
          </div>
        )}

        {/* КОНТЕНТ */}
        {!isAuthPage&&(
          <div className="scroll-wrap">

            {/* ГЛАВНАЯ */}
            {page==="home"&&(
              <div className="fadein">
                <div style={{marginBottom:16}}>
                  <p style={{fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,margin:"0 0 10px"}}>Предмет</p>
                  <div className="drag-scroll" {...subjectScroll} ref={subjectScroll.ref}>
                    <button className={`subject-pill${!subject?" active":""}`} onClick={()=>setSubject(null)}>✨ Любой</button>
                    {SUBJECTS.map(s=><button key={s.id} className={`subject-pill${subject?.id===s.id?" active":""}`} onClick={()=>setSubject(s)}>{s.emoji} {s.name}</button>)}
                  </div>
                </div>
                <div className="card" style={{padding:22}}>
                  {error&&<p style={{color:"var(--red)",fontSize:13,textAlign:"center",marginBottom:12}}>{error}</p>}
                {limitError&&(
                  <div style={{background:"rgba(200,134,10,0.1)",border:"1px solid var(--accent)",borderRadius:12,padding:"12px 16px",marginBottom:12,textAlign:"center"}}>
                    <p style={{color:"var(--accent)",fontSize:13,margin:"0 0 8px"}}>{limitError}</p>
                    <button className="pbtn" style={{padding:"8px 20px",fontSize:13}} onClick={activatePremium}>🚀 Активировать Premium</button>
                  </div>
                )}
                {subscription&&subscription.plan==="free"&&(
                  <div style={{display:"flex",gap:8,marginBottom:10,fontSize:12,color:"var(--text3)"}}>
                    <span>📚 Тем сегодня: {subscription.usage.explain.used}/{subscription.usage.explain.limit}</span>
                    <span>·</span>
                    <span>📸 Фото: {subscription.usage.homework.used}/{subscription.usage.homework.limit}</span>
                  </div>
                )}
                  <div style={{display:"flex",gap:10,marginBottom:14}}>
                    <input className="zinput" value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&start()} placeholder={subject?`Тема: ${subject.name}...`:"Введи любую тему..."}/>
                    <button className="pbtn" style={{padding:"13px 18px",flexShrink:0}} onClick={start}>→</button>
                  </div>
                  <div>{hints.map(h=><span key={h} className="chip" onClick={()=>setTopic(h)}>{h}</span>)}</div>
                </div>
              </div>
            )}

            {/* ЗАГРУЗКА */}
            {page==="loading"&&(
              <div className="card fadein" style={{padding:44,textAlign:"center",marginTop:16}}>
                <div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:44,height:44,animation:"spin .8s linear infinite",margin:"0 auto 18px"}}/>
                <p style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"var(--accent)",margin:0}}>Изучаю тему...</p>
                <p style={{fontStyle:"italic",color:"var(--text3)",fontSize:13,marginTop:8}}>«{topic}»</p>
              </div>
            )}

            {/* УРОК */}
            {page==="learn"&&data&&(
              <div className="fadein">
                <div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text3)",marginBottom:6}}>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"70%"}}>{data.topic}</span>
                    <span style={{display:"flex",gap:8,alignItems:"center"}}>
                      {data.ageGroup&&<span style={{background:"var(--badge-bg)",border:"1px solid var(--badge-border)",borderRadius:20,padding:"2px 8px",fontSize:11,color:"var(--accent)"}}>{data.ageGroup}</span>}
                      {secIdx+1}/{data.sections.length}
                    </span>
                  </div>
                  <div style={{height:4,background:"var(--progress-bg)",borderRadius:2}}>
                    <div style={{height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${((secIdx+1)/data.sections.length)*100}%`,transition:"width .5s",borderRadius:2}}/>
                  </div>
                </div>
                <div className="card" style={{padding:24}}>
                  <div style={{fontSize:40,marginBottom:10}}>{data.sections[secIdx].emoji}</div>
                  <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--accent)",margin:"0 0 12px"}}>{data.sections[secIdx].title}</h2>
                  <p style={{fontSize:16,lineHeight:1.8,color:"var(--text2)",margin:"0 0 22px"}}>
                    {displayed}<span style={{animation:"blink 1s infinite",display:"inline-block"}}>▌</span>
                  </p>
                  {typeDone&&data.funFact&&secIdx===data.sections.length-1&&(
                    <div style={{background:"var(--badge-bg)",border:"1px solid var(--badge-border)",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:14,color:"var(--text2)"}}>
                      💡 <strong style={{color:"var(--accent)"}}>Интересный факт:</strong> {data.funFact}
                    </div>
                  )}
                  {typeDone&&<div style={{textAlign:"right"}}>
                    <button className="pbtn" onClick={nextSection}>{secIdx<data.sections.length-1?"Дальше →":"Пройти тест 📝"}</button>
                  </div>}
                </div>
              </div>
            )}

            {/* КВИЗ */}
            {page==="quiz"&&data&&(
              <div className="fadein">
                <div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text3)",marginBottom:6}}>
                    <span>Проверка знаний</span><span>{quizStep+1}/{data.quiz.length}</span>
                  </div>
                  <div style={{height:4,background:"var(--progress-bg)",borderRadius:2}}>
                    <div style={{height:"100%",background:"linear-gradient(90deg,#50c878,#20d898)",width:`${(quizStep/data.quiz.length)*100}%`,transition:"width .5s",borderRadius:2}}/>
                  </div>
                </div>
                <div className="card" style={{padding:24}}>
                  <p style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"var(--text)",margin:"0 0 18px",lineHeight:1.55}}>{data.quiz[quizStep].q}</p>
                  {data.quiz[quizStep].options.map((opt,i)=>{
                    let cls="opt";
                    if(selected!==null){if(i===data.quiz[quizStep].correct)cls+=" opt-ok";else if(i===selected)cls+=" opt-no";}
                    return<button key={i} className={cls} onClick={()=>answer(i)}><span style={{opacity:.4,marginRight:8}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;
                  })}
                </div>
              </div>
            )}

            {/* РЕЗУЛЬТАТ */}
            {page==="result"&&data&&(
              <div className="fadein card" style={{padding:32,textAlign:"center",marginTop:8}}>
                <div style={{fontSize:52,marginBottom:12}}>{score===data.quiz.length?"🏆":score>=2?"⭐":"📚"}</div>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"var(--accent)",margin:"0 0 8px"}}>{score===data.quiz.length?"Отлично!":score>=2?"Хорошо!":"Попробуй ещё!"}</h2>
                <p style={{fontSize:15,color:"var(--text2)",marginBottom:22}}>
                  Правильных: <strong style={{color:"var(--accent)"}}>{score}</strong> из {data.quiz.length}<br/><em>«{data.topic}»</em>
                </p>
                {streakData&&(
                  <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16,flexWrap:"wrap"}}>
                    <span className="badge">⚡ +{streakData.xp} XP</span>
                    {streakData.streak>1&&<span className="badge">🔥 {streakData.streak} дней подряд! +{streakData.bonus} бонус</span>}
                  </div>
                )}
                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                  <button className="pbtn" onClick={resetLearn}>Новая тема</button>
                  <button className="sbtn" onClick={()=>{setSecIdx(0);setPage("learn");}}>📖 Перечитать</button>
                  {score<data.quiz.length&&<button className="sbtn" onClick={()=>{setPage("quiz");setQuizStep(0);setAnswers([]);setSelected(null);}}>🔄 Повторить тест</button>}
                </div>
              </div>
            )}

            {/* ГОЛОС */}
            {page==="voice"&&(
              <div className="fadein">
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 6px"}}>🎤 Голосовой помощник</h2>
                <p style={{color:"var(--text3)",fontSize:13,margin:"0 0 12px"}}>Задай вопрос голосом — Знайка ответит вслух</p>
                <div className="drag-scroll" {...subjectScroll} ref={subjectScroll.ref} style={{marginBottom:16}}>
                  <button className={`subject-pill${!subject?" active":""}`} onClick={()=>setSubject(null)}>✨ Любой</button>
                  {SUBJECTS.map(s=><button key={s.id} className={`subject-pill${subject?.id===s.id?" active":""}`} onClick={()=>setSubject(s)}>{s.emoji} {s.name}</button>)}
                </div>

                {!voiceSupported&&(
                  <div className="card" style={{padding:22,textAlign:"center"}}>
                    <p style={{fontSize:32,margin:"0 0 10px"}}>😔</p>
                    <p style={{color:"var(--text2)"}}>Твой браузер не поддерживает голосовой ввод.<br/>Попробуй Chrome или Edge.</p>
                  </div>
                )}

                {voiceSupported&&(
                  <>
                    {/* История диалога */}
                    {voiceHistory.length>0&&(
                      <div style={{marginBottom:16,maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
                        {voiceHistory.map((msg,i)=>(
                          <div key={i} style={{
                            padding:"12px 16px",borderRadius:16,fontSize:15,lineHeight:1.6,
                            background:msg.role==="user"?"linear-gradient(135deg,var(--accent),var(--accent2))":"var(--card)",
                            color:msg.role==="user"?"var(--btn-text)":"var(--text2)",
                            border:msg.role==="assistant"?"1px solid var(--card-border)":"none",
                            alignSelf:msg.role==="user"?"flex-end":"flex-start",
                            maxWidth:"85%"
                          }}>
                            {msg.text}
                          </div>
                        ))}
                        {voiceState==="thinking"&&(
                          <div style={{padding:"12px 16px",borderRadius:16,background:"var(--card)",border:"1px solid var(--card-border)",color:"var(--text3)",fontSize:14,alignSelf:"flex-start"}}>
                            <span style={{animation:"blink 1s infinite",display:"inline-block"}}>⏳ Думаю...</span>
                          </div>
                        )}
                      </div>
                    )}

                    {/* Кнопка микрофона */}
                    <div className="card" style={{padding:32,textAlign:"center"}}>
                      <button
                        className={`voice-btn${voiceState==="listening"?" listening":""}${!voiceSupported?" disabled":""}`}
                        style={{margin:"0 auto 16px",display:"flex"}}
                        onClick={voiceState==="idle"?startListening:stopListening}
                      >
                        {voiceState==="listening"?"🔴":voiceState==="thinking"?"⏳":voiceState==="speaking"?"🔊":"🎤"}
                      </button>
                      <p style={{color:"var(--text2)",fontSize:15,margin:"0 0 6px",fontWeight:600}}>
                        {voiceState==="idle"?"Нажми и говори":voiceState==="listening"?"Слушаю...":voiceState==="thinking"?"Думаю...":"Отвечаю..."}
                      </p>
                      <p style={{color:"var(--text3)",fontSize:13,margin:0}}>
                        {voiceState==="idle"?"Задай любой вопрос по теме":"Нажми ещё раз чтобы остановить"}
                      </p>
                    </div>

                    {voiceHistory.length>0&&(
                      <button className="sbtn" style={{marginTop:12,width:"100%"}} onClick={()=>{setVoiceHistory([]);setVoiceText("");setVoiceAnswer("");}}>
                        Очистить диалог
                      </button>
                    )}
                  </>
                )}
              </div>
            )}

            {/* ФОТО ДЗ */}
            {page==="homework"&&(
              <div className="fadein">
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 16px"}}>📸 Фото домашнего задания</h2>
                {!hwImage?(
                  <div className="photo-drop" onClick={()=>fileRef.current.click()}>
                    <div style={{fontSize:48,marginBottom:12}}>📷</div>
                    <p style={{color:"var(--text2)",fontSize:15,margin:"0 0 6px",fontWeight:600}}>Нажми чтобы выбрать фото</p>
                    <p style={{color:"var(--text3)",fontSize:13,margin:0}}>Сфотографируй задание из учебника или тетради</p>
                    <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
                  </div>
                ):(
                  <div>
                    <div style={{position:"relative",marginBottom:14}}>
                      <img src={hwImage} style={{width:"100%",borderRadius:16,maxHeight:300,objectFit:"cover"}} alt="ДЗ"/>
                      <button onClick={()=>{setHwImage(null);setHwResult(null);}} style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",width:32,height:32,color:"#fff",cursor:"pointer",fontSize:16}}>✕</button>
                    </div>
                    {!hwResult&&(
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        <button className="pbtn" style={{flex:1}} onClick={analyzeHw} disabled={hwLoading}>{hwLoading?"⏳ Анализирую...":"🔍 Разобрать задание"}</button>
                        <button className="sbtn" onClick={()=>{setHwImage(null);if(fileRef.current)fileRef.current.value="";}}>Другое фото</button>
                      </div>
                    )}
                    {hwError&&<p style={{color:"var(--red)",fontSize:13,marginTop:12}}>{hwError}</p>}
                    {hwResult&&(
                      <div className="card fadein" style={{padding:22,marginTop:14}}>
                        <h3 style={{fontFamily:"'Playfair Display',serif",color:"var(--accent)",margin:"0 0 12px",fontSize:18}}>✅ Разбор задания</h3>
                        <div style={{fontSize:15,lineHeight:1.8,color:"var(--text2)",whiteSpace:"pre-wrap"}}>{hwResult}</div>
                        <button className="sbtn" style={{marginTop:16}} onClick={()=>{setHwImage(null);setHwResult(null);}}>Новое задание</button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* КАБИНЕТ */}
            {page==="cabinet"&&(
              <div className="fadein">
                <div className="card" style={{padding:20,marginBottom:14}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:stats?14:0}}>
                    <div style={{width:50,height:50,borderRadius:"50%",background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,color:"var(--btn-text)",fontFamily:"'Playfair Display',serif",fontWeight:700,flexShrink:0}}>
                      {user?.email?.[0]?.toUpperCase()||"?"}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"var(--text)",fontWeight:700}}>Мой кабинет</div>
                      <div style={{fontSize:12,color:"var(--text3)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user?.email}</div>
                    </div>
                    <button className="sbtn" style={{padding:"7px 14px",fontSize:12}} onClick={logout}>Выйти</button>
                  </div>
                  {/* XP и уровень */}
                  {stats&&(
                    <div style={{borderTop:"1px solid var(--card-border)",paddingTop:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontSize:16}}>{stats.emoji} <strong style={{fontFamily:"'Playfair Display',serif",color:"var(--accent)"}}>{stats.title}</strong></span>
                        <span style={{fontSize:13,color:"var(--text3)"}}>Ур. {stats.level} · {stats.xp} XP</span>
                      </div>
                      <div className="xp-bar">
                        <div className="xp-fill" style={{width:stats.next?`${Math.min(100,(stats.xp/stats.next)*100)}%`:"100%"}}/>
                      </div>
                      {stats.next&&<p style={{fontSize:11,color:"var(--text3)",margin:"4px 0 0",textAlign:"right"}}>до следующего уровня: {stats.next-stats.xp} XP</p>}
                      {stats.ageGroup&&<p style={{fontSize:12,color:"var(--accent)",margin:"6px 0 0"}}>Группа: {stats.ageGroup}</p>}
                    </div>
                  )}
                </div>

                {!stats?(
                  <div style={{textAlign:"center",padding:40}}>
                    <div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:36,height:36,animation:"spin .8s linear infinite",margin:"0 auto"}}/>
                  </div>
                ):(
                  <>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
                      {[{l:"Уроков",v:stats.progress.length,i:"📚"},{l:"Наград",v:stats.achievements.length,i:"🏆"},{l:"XP",v:stats.xp,i:"⚡"}].map(x=>(
                        <div key={x.l} className="card" style={{padding:"14px 10px",textAlign:"center"}}>
                          <div style={{fontSize:20}}>{x.i}</div>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",fontWeight:700}}>{x.v}</div>
                          <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{x.l}</div>
                        </div>
                      ))}
                    </div>
                    {stats.achievements.length>0&&(
                      <div className="card" style={{padding:18,marginBottom:14}}>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",marginBottom:10}}>🏅 Достижения</div>
                        <div>{stats.achievements.map((a,i)=><span key={i} className="badge">{BADGE_ICONS[a.badge_name]||"🎖️"} {a.badge_name}</span>)}</div>
                      </div>
                    )}
                    {stats.progress.filter(p=>p.score<2).length>0&&(
                      <div className="card fadein" style={{padding:18,marginBottom:14,background:"rgba(224,85,85,0.05)",border:"1px solid rgba(224,85,85,0.2)"}}>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--red)",marginBottom:10}}>⚠️ Стоит повторить</div>
                        {stats.progress.filter(p=>p.score<2).slice(0,3).map((p,i)=>(
                          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                            <span style={{fontSize:14,color:"var(--text2)"}}>{p.topic}</span>
                            <button className="pbtn" style={{padding:"6px 14px",fontSize:12,flexShrink:0}}
                              onClick={()=>{setTopic(p.topic);setPage("loading");apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic:p.topic})}).then(json=>{if(json.success){setData({...json.data,topic:p.topic});setSecIdx(0);setPage("learn");}else setPage("cabinet");});}}>
                              🔄 Улучшить
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                    {stats.progress.length>0?(
                      <div className="card" style={{padding:18}}>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",marginBottom:10}}>📖 Пройденные темы</div>
                        {stats.progress.slice(0,10).map((p,i)=>(
                          <div key={i} className="stat-row">
                            <div style={{display:"flex",flexDirection:"column",gap:2}}>
                              <span style={{fontSize:14,color:"var(--text2)"}}>{p.topic}</span>
                              {p.score<3&&(
                                <button onClick={()=>{setTopic(p.topic);setPage("loading");apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic:p.topic})}).then(json=>{if(json.success){setData({...json.data,topic:p.topic});setSecIdx(0);setPage("learn");}else setPage("cabinet");});}}
                                  style={{background:"none",border:"none",color:"var(--accent)",fontSize:11,cursor:"pointer",textAlign:"left",padding:0}}>
                                  {p.score<2?"🔄 Улучшить результат":"📖 Повторить"}
                                </button>
                              )}
                            </div>
                            <span style={{fontSize:13,color:p.score===3?"var(--green)":p.score>=2?"var(--accent)":"var(--red)",flexShrink:0}}>{p.score}/3 {p.score===3?"🏆":p.score>=2?"⭐":"📚"}</span>
                          </div>
                        ))}
                      </div>
                    ):(
                      <div className="card" style={{padding:28,textAlign:"center"}}>
                        <div style={{fontSize:36,marginBottom:10}}>🌱</div>
                        <p style={{color:"var(--text3)",fontSize:14}}>Пока нет пройденных уроков.<br/>Начни учиться!</p>
                        <button className="pbtn" style={{marginTop:14}} onClick={()=>setPage("home")}>Начать →</button>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

          </div>
        )}

            {/* КАБИНЕТ РОДИТЕЛЯ */}
            {/* УЧЕБНЫЕ ПЛАНЫ */}
            {page==="plans"&&(
              <div className="fadein">
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 6px"}}>🗺️ Учебные планы</h2>
                <p style={{color:"var(--text3)",fontSize:13,margin:"0 0 16px"}}>Выбери тему — получи roadmap с прогрессом</p>

                {/* Если открыт конкретный план */}
                {activePlan?(
                  <div>
                    <button className="sbtn" style={{marginBottom:14,fontSize:13}} onClick={()=>setActivePlan(null)}>← Все планы</button>
                    <div className="card" style={{padding:20,marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                        <div>
                          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"var(--accent)",margin:"0 0 4px"}}>{activePlan.title}</h3>
                          {activePlan.subject&&<span className="chip" style={{fontSize:11}}>{activePlan.subject}</span>}
                        </div>
                        <button onClick={()=>deletePlan(activePlan.id)} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18}}>🗑️</button>
                      </div>
                      {/* Прогресс бар */}
                      {(()=>{
                        const done=(activePlan.completed_topics||[]).length;
                        const total=(activePlan.topics||[]).length;
                        const pct=total>0?Math.round((done/total)*100):0;
                        return(
                          <div>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--text3)",marginBottom:6}}>
                              <span>Прогресс</span>
                              <span style={{color:"var(--accent)",fontWeight:700}}>{done}/{total} тем · {pct}%</span>
                            </div>
                            <div style={{height:8,background:"var(--progress-bg)",borderRadius:4,marginBottom:16}}>
                              <div style={{height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${pct}%`,borderRadius:4,transition:"width .5s"}}/>
                            </div>
                          </div>
                        );
                      })()}
                    </div>

                    {/* Список подтем */}
                    {(activePlan.topics||[]).map((t,i)=>{
                      const done=(activePlan.completed_topics||[]).includes(t.title);
                      return(
                        <div key={i} className="card" style={{padding:16,marginBottom:10,opacity:done?0.7:1,borderLeft:`3px solid ${done?"var(--green)":"var(--card-border)"}`}}>
                          <div style={{display:"flex",alignItems:"center",gap:12}}>
                            <div style={{width:32,height:32,borderRadius:"50%",background:done?"var(--green)":"var(--progress-bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                              {done?"✓":t.emoji}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <p style={{fontSize:15,color:done?"var(--text3)":"var(--text)",margin:"0 0 2px",fontWeight:done?400:600,textDecoration:done?"line-through":"none"}}>{t.title}</p>
                              <p style={{fontSize:12,color:"var(--text3)",margin:0}}>{t.description}</p>
                            </div>
                            <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
                              {!done&&(
                                <button className="pbtn" style={{padding:"7px 12px",fontSize:12}}
                                  onClick={()=>{setTopic(t.title);setPage("loading");apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic:t.title,subject:activePlan.subject})}).then(json=>{if(json.success){setData({...json.data,topic:t.title});setSecIdx(0);setPage("learn");}});}}>
                                  Учить →
                                </button>
                              )}
                              <button onClick={()=>completeTopic(activePlan.id,t.title)}
                                style={{background:"none",border:`1px solid ${done?"var(--red)":"var(--green)"}`,borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer",color:done?"var(--red)":"var(--green)"}}>
                                {done?"↩ Отменить":"✓ Готово"}
                              </button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ):(
                  /* Список всех планов + создание нового */
                  <div>
                    {/* Создать новый */}
                    <div className="card" style={{padding:20,marginBottom:16}}>
                      <p style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",margin:"0 0 10px"}}>➕ Новый план</p>
                      <div style={{marginBottom:10}}>
                        <p style={{fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>Предмет</p>
                        <div className="drag-scroll">
                          <button className={`subject-pill${!subject?" active":""}`} onClick={()=>setSubject(null)}>✨ Любой</button>
                          {SUBJECTS.map(s=><button key={s.id} className={`subject-pill${subject?.id===s.id?" active":""}`} onClick={()=>setSubject(s)}>{s.emoji} {s.name}</button>)}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <input className="zinput" placeholder='Например: "Алгебра" или "Английские времена"'
                          value={planTopic} onChange={e=>setPlanTopic(e.target.value)}
                          onKeyDown={e=>e.key==="Enter"&&createPlan()} style={{flex:1}}/>
                        <button className="pbtn" style={{padding:"13px 16px",flexShrink:0}} onClick={createPlan} disabled={planLoading}>
                          {planLoading?"⏳":"→"}
                        </button>
                      </div>
                      {planError&&<p style={{color:"var(--red)",fontSize:13,marginTop:8}}>{planError}</p>}
                    </div>

                    {/* Существующие планы */}
                    {plans===null?(
                      <div style={{textAlign:"center",padding:30}}>
                        <div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:36,height:36,animation:"spin .8s linear infinite",margin:"0 auto"}}/>
                      </div>
                    ):plans.length===0?(
                      <div className="card" style={{padding:28,textAlign:"center"}}>
                        <p style={{fontSize:36,margin:"0 0 10px"}}>🗺️</p>
                        <p style={{color:"var(--text3)",fontSize:14}}>Создай первый план выше — получи roadmap по любой теме!</p>
                      </div>
                    ):(
                      plans.map(plan=>{
                        const done=(plan.completed_topics||[]).length;
                        const total=(plan.topics||[]).length;
                        const pct=total>0?Math.round((done/total)*100):0;
                        return(
                          <div key={plan.id} className="card fadein" style={{padding:18,marginBottom:10,cursor:"pointer"}} onClick={()=>setActivePlan(plan)}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                              <div>
                                <p style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"var(--text)",margin:"0 0 3px"}}>{plan.title}</p>
                                <p style={{fontSize:12,color:"var(--text3)",margin:0}}>{plan.subject||"Общее"} · {total} тем</p>
                              </div>
                              <span style={{fontSize:18,fontWeight:700,color:pct===100?"var(--green)":"var(--accent)"}}>{pct}%</span>
                            </div>
                            <div style={{height:6,background:"var(--progress-bg)",borderRadius:3}}>
                              <div style={{height:"100%",background:pct===100?"var(--green)":"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${pct}%`,borderRadius:3,transition:"width .5s"}}/>
                            </div>
                            <p style={{fontSize:11,color:"var(--text3)",margin:"6px 0 0"}}>{done}/{total} выполнено</p>
                          </div>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            )}

            {page==="parent"&&(
              <div className="fadein">
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 6px"}}>👨‍👩‍👧 Семья</h2>
                <p style={{color:"var(--text3)",fontSize:13,margin:"0 0 16px"}}>Следи за прогрессом детей</p>

                {/* Добавить ребёнка */}
                <div className="card" style={{padding:20,marginBottom:14}}>
                  <p style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",margin:"0 0 12px"}}>➕ Добавить ребёнка</p>
                  <div style={{display:"flex",gap:8}}>
                    <input className="zinput" placeholder="Email ребёнка" value={childEmail} onChange={e=>setChildEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addChild()} style={{flex:1}}/>
                    <button className="pbtn" style={{padding:"13px 16px",flexShrink:0}} onClick={addChild} disabled={addChildLoading}>{addChildLoading?"⏳":"→"}</button>
                  </div>
                  {addChildMsg&&<p style={{fontSize:13,margin:"8px 0 0",color:addChildMsg.startsWith("✅")?"var(--green)":"var(--red)"}}>{addChildMsg}</p>}
                </div>

                {/* Подписка */}
                {subscription&&(
                  <div className="card" style={{padding:20,marginBottom:14,background:subscription.isPremium?"linear-gradient(135deg,rgba(200,134,10,0.15),rgba(230,160,32,0.1))":"var(--card)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <p style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"var(--accent)",margin:"0 0 4px"}}>
                          {subscription.isPremium?"👑 Premium":"🆓 Бесплатный план"}
                        </p>
                        {!subscription.isPremium&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>5 тем · 2 фото ДЗ · 10 голосов в день</p>}
                        {subscription.isPremium&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>Безлимитный доступ ко всем функциям</p>}
                      </div>
                      {!subscription.isPremium&&(
                        <button className="pbtn" style={{padding:"9px 16px",fontSize:13}} onClick={activatePremium}>🚀 Premium</button>
                      )}
                    </div>
                    {!subscription.isPremium&&(
                      <div style={{marginTop:12,display:"flex",gap:12,fontSize:12,color:"var(--text2)"}}>
                        <span>📚 {subscription.usage.explain.used}/{subscription.usage.explain.limit} тем</span>
                        <span>📸 {subscription.usage.homework.used}/{subscription.usage.homework.limit} фото</span>
                        <span>🎤 {subscription.usage.voice.used}/{subscription.usage.voice.limit} голос</span>
                      </div>
                    )}
                  </div>
                )}

                {/* Дети */}
                {children===null?(
                  <div style={{textAlign:"center",padding:30}}>
                    <div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:36,height:36,animation:"spin .8s linear infinite",margin:"0 auto"}}/>
                  </div>
                ):children.length===0?(
                  <div className="card" style={{padding:28,textAlign:"center"}}>
                    <p style={{fontSize:36,margin:"0 0 10px"}}>👶</p>
                    <p style={{color:"var(--text3)",fontSize:14}}>Добавь email ребёнка выше чтобы видеть его прогресс</p>
                  </div>
                ):(
                  children.map(child=>(
                    <div key={child.id} className="card fadein" style={{padding:20,marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <div>
                          <p style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:"var(--text)",margin:"0 0 2px"}}>{child.name}</p>
                          <p style={{fontSize:12,color:"var(--text3)",margin:0}}>{child.age} лет · {child.emoji} {child.title}</p>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <p style={{fontSize:16,color:"var(--accent)",fontWeight:700,margin:"0 0 2px"}}>⚡ {child.xp} XP</p>
                          {child.streak>1&&<p style={{fontSize:12,color:"var(--text3)",margin:0}}>🔥 {child.streak} дней</p>}
                        </div>
                      </div>
                      {/* XP bar */}
                      <div className="xp-bar" style={{marginBottom:12}}>
                        <div className="xp-fill" style={{width:child.next?`${Math.min(100,(child.xp/child.next)*100)}%`:"100%"}}/>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:child.weakTopics?.length>0?12:0}}>
                        {[{l:"Уроков",v:child.totalLessons,i:"📚"},{l:"Средний балл",v:child.avgScore+"/3",i:"⭐"},{l:"Наград",v:child.achievements,i:"🏆"}].map(x=>(
                          <div key={x.l} style={{background:"var(--stat-bg)",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
                            <div style={{fontSize:16}}>{x.i}</div>
                            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"var(--accent)",fontWeight:700}}>{x.v}</div>
                            <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{x.l}</div>
                          </div>
                        ))}
                      </div>
                      {child.weakTopics?.length>0&&(
                        <div style={{background:"rgba(224,85,85,0.08)",border:"1px solid rgba(224,85,85,0.2)",borderRadius:10,padding:"10px 12px"}}>
                          <p style={{fontSize:12,color:"var(--red)",margin:"0 0 4px",fontWeight:600}}>⚠️ Слабые темы:</p>
                          {child.weakTopics.map((t,i)=><p key={i} style={{fontSize:12,color:"var(--text3)",margin:"2px 0"}}>{t.topic} — {t.score}/3</p>)}
                        </div>
                      )}
                    </div>
                  ))
                )}
              </div>
            )}

          </div>
        )}

        {/* НИЖНЯЯ НАВИГАЦИЯ */}
        {showNav&&(
          <nav className="bottom-nav">
            {NAV_ITEMS.map(item=>(
              <button key={item.id} className={`nav-item${page===item.id?" active":""}`}
                onClick={()=>{
                  setPage(item.id);
                  if(item.id==="cabinet")loadStats();
                  if(item.id==="parent"){loadChildren();loadSubscription();}
                  if(item.id==="plans")loadPlans();
                }}>
                <span>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </nav>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
