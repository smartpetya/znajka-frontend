<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Знайка — твой репетитор</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,400;1,300&display=swap" rel="stylesheet"/>
</head>
<body style="margin:0">
  <div id="root"></div>
  <script type="text/babel">
    const API_URL = "https://znajka-backend-production.up.railway.app";
    const SUGGESTIONS = ["Фотосинтез","Теорема Пифагора","Динозавры","Чёрные дыры","ДНК","Вулканы"];

    function App() {
      const [stage, setStage] = React.useState("home");
      const [topic, setTopic] = React.useState("");
      const [data, setData] = React.useState(null);
      const [error, setError] = React.useState(null);
      const [secIdx, setSecIdx] = React.useState(0);
      const [typeDone, setTypeDone] = React.useState(false);
      const [quizStep, setQuizStep] = React.useState(0);
      const [selected, setSelected] = React.useState(null);
      const [answers, setAnswers] = React.useState([]);
      const [score, setScore] = React.useState(0);
      const [displayed, setDisplayed] = React.useState("");

      React.useEffect(() => {
        if (stage !== "learn" || !data) return;
        const text = data.sections[secIdx].text;
        let i = 0; setDisplayed(""); setTypeDone(false);
        const t = setInterval(() => {
          if (i < text.length) setDisplayed(text.slice(0, ++i));
          else { clearInterval(t); setTypeDone(true); }
        }, 18);
        return () => clearInterval(t);
      }, [stage, secIdx, data]);

      const start = async () => {
        if (!topic.trim()) return;
        setStage("loading"); setError(null);
        try {
          const res = await fetch(`${API_URL}/api/explain`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({topic})
          });
          const json = await res.json();
          if (!json.success) throw new Error(json.error);
          setData({...json.data, topic});
          setSecIdx(0); setStage("learn");
        } catch(err) {
          setError("Ошибка: " + err.message); setStage("home");
        }
      };

      const nextSection = () => {
        if (secIdx < data.sections.length-1) setSecIdx(secIdx+1);
        else { setStage("quiz"); setQuizStep(0); setAnswers([]); setSelected(null); }
      };

      const answer = (idx) => {
        if (selected !== null) return;
        setSelected(idx);
        const correct = idx === data.quiz[quizStep].correct;
        const newAns = [...answers, correct];
        setAnswers(newAns);
        setTimeout(() => {
          if (quizStep < data.quiz.length-1) { setQuizStep(quizStep+1); setSelected(null); }
          else { setScore(newAns.filter(Boolean).length); setStage("result"); }
        }, 900);
      };

      const reset = () => { setStage("home"); setTopic(""); setData(null); setError(null); };

      const s = {
        wrap: {minHeight:"100vh",background:"linear-gradient(160deg,#0a0820,#16133a 55%,#0c1a28)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"Georgia,serif",color:"#ede6d3"},
        card: {background:"rgba(255,255,255,.045)",border:"1px solid rgba(245,200,66,.18)",borderRadius:22,backdropFilter:"blur(12px)"},
        pbtn: {background:"linear-gradient(135deg,#f5c842,#d98d18)",color:"#180800",border:"none",borderRadius:50,padding:"13px 32px",fontSize:16,fontFamily:"'Playfair Display',serif",fontWeight:700,cursor:"pointer"},
        sbtn: {background:"transparent",color:"#f5c842",border:"1px solid rgba(245,200,66,.35)",borderRadius:50,padding:"10px 22px",fontSize:14,cursor:"pointer"},
        input: {background:"rgba(255,255,255,.06)",border:"1px solid rgba(245,200,66,.28)",borderRadius:12,padding:"13px 18px",color:"#ede6d3",fontSize:16,outline:"none",width:"100%",fontFamily:"Georgia,serif"},
      };

      return (
        <div style={s.wrap}>
          <style>{`
            @keyframes spin{to{transform:rotate(360deg)}}
            @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
            .opt{width:100%;text-align:left;padding:13px 17px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#ede6d3;font-size:15px;cursor:pointer;margin-bottom:9px;display:block;font-family:Georgia,serif}
            .opt:hover{background:rgba(245,200,66,.09)}
            .opt-ok{background:rgba(70,190,110,.18)!important;border-color:#46be6e!important;color:#a0ffb8!important}
            .opt-no{background:rgba(210,70,70,.18)!important;border-color:#d24646!important;color:#ffaaaa!important}
            .chip{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.22);border-radius:30px;padding:6px 15px;font-size:13px;cursor:pointer;color:#c8b660;display:inline-block;margin:3px}
            .chip:hover{background:rgba(245,200,66,.17);color:#f5c842}
          `}</style>

          <div style={{width:"100%",maxWidth:520}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontSize:44}}>🦉</div>
              <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:38,fontWeight:900,margin:"4px 0 0",color:"#f5e6b8"}}>Знайка</h1>
              <p style={{fontStyle:"italic",color:"rgba(237,230,211,.4)",fontSize:13,margin:"4px 0 0"}}>твой личный репетитор</p>
            </div>

            {stage==="home" && <div style={{...s.card,padding:30}}>
              <p style={{fontSize:16,lineHeight:1.65,color:"rgba(237,230,211,.7)",textAlign:"center",margin:"0 0 22px"}}>Введи любую тему — объясню просто<br/>и помогу закрепить результат ✨</p>
              {error && <p style={{color:"#ff8080",fontSize:14,textAlign:"center",marginBottom:16}}>{error}</p>}
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <input style={s.input} value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&start()} placeholder="Например: гравитация..."/>
                <button style={{...s.pbtn,padding:"13px 18px",flexShrink:0}} onClick={start}>→</button>
              </div>
              <div>{SUGGESTIONS.map(t=><span key={t} className="chip" onClick={()=>setTopic(t)}>{t}</span>)}</div>
            </div>}

            {stage==="loading" && <div style={{...s.card,padding:44,textAlign:"center"}}>
              <div style={{border:"3px solid rgba(245,200,66,.15)",borderTopColor:"#f5c842",borderRadius:"50%",width:44,height:44,animation:"spin .8s linear infinite",margin:"0 auto 20px"}}/>
              <p style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#f5e6b8",margin:0}}>Изучаю тему...</p>
              <p style={{fontStyle:"italic",color:"rgba(237,230,211,.35)",fontSize:13,marginTop:8}}>«{topic}»</p>
            </div>}

            {stage==="learn" && data && <div>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(237,230,211,.38)",marginBottom:5}}>
                  <span>{data.topic}</span><span>{secIdx+1}/{data.sections.length}</span>
                </div>
                <div style={{height:3,background:"rgba(255,255,255,.08)",borderRadius:2}}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#f5c842,#d98d18)",width:`${((secIdx+1)/data.sections.length)*100}%`,transition:"width .5s",borderRadius:2}}/>
                </div>
              </div>
              <div style={{...s.card,padding:30}}>
                <div style={{fontSize:38,marginBottom:10}}>{data.sections[secIdx].emoji}</div>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:"#f5c842",margin:"0 0 14px"}}>{data.sections[secIdx].title}</h2>
                <p style={{fontSize:16,lineHeight:1.8,color:"rgba(237,230,211,.82)",margin:"0 0 26px"}}>
                  {displayed}<span style={{animation:"blink 1s infinite",display:"inline-block"}}>▌</span>
                </p>
                {typeDone && <div style={{textAlign:"right"}}>
                  <button style={s.pbtn} onClick={nextSection}>{secIdx<data.sections.length-1?"Дальше →":"Пройти тест 📝"}</button>
                </div>}
              </div>
            </div>}

            {stage==="quiz" && data && <div>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"rgba(237,230,211,.38)",marginBottom:5}}>
                  <span>Проверка знаний</span><span>{quizStep+1}/{data.quiz.length}</span>
                </div>
                <div style={{height:3,background:"rgba(255,255,255,.08)",borderRadius:2}}>
                  <div style={{height:"100%",background:"linear-gradient(90deg,#50c878,#20d898)",width:`${(quizStep/data.quiz.length)*100}%`,transition:"width .5s",borderRadius:2}}/>
                </div>
              </div>
              <div style={{...s.card,padding:30}}>
                <p style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#f5e6b8",margin:"0 0 22px",lineHeight:1.5}}>{data.quiz[quizStep].q}</p>
                {data.quiz[quizStep].options.map((opt,i)=>{
                  let cls="opt";
                  if(selected!==null){if(i===data.quiz[quizStep].correct)cls+=" opt-ok";else if(i===selected)cls+=" opt-no";}
                  return <button key={i} className={cls} onClick={()=>answer(i)}><span style={{opacity:.4,marginRight:9}}>{String.fromCharCode(65+i)}.</span>{opt}</button>;
                })}
              </div>
            </div>}

            {stage==="result" && data && <div style={{...s.card,padding:38,textAlign:"center"}}>
              <div style={{fontSize:52,marginBottom:14}}>{score===data.quiz.length?"🏆":score>=2?"⭐":"📚"}</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#f5c842",margin:"0 0 8px"}}>{score===data.quiz.length?"Отлично!":score>=2?"Хорошо!":"Попробуй ещё!"}</h2>
              <p style={{fontSize:16,color:"rgba(237,230,211,.65)",marginBottom:28}}>
                Правильных: <strong style={{color:"#f5c842"}}>{score}</strong> из {data.quiz.length}<br/>
                тема: <em>«{data.topic}»</em>
              </p>
              <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
                <button style={s.pbtn} onClick={reset}>Новая тема</button>
                {score<data.quiz.length && <button style={s.sbtn} onClick={()=>{setStage("quiz");setQuizStep(0);setAnswers([]);setSelected(null);}}>Повторить</button>}
              </div>
            </div>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
