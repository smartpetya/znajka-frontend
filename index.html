      --chip-bg:rgba(245,200,66,0.07);--chip-border:rgba(245,200,66,0.22);--chip-text:#c8b660;
      --stat-bg:rgba(255,255,255,0.04);--badge-bg:rgba(245,200,66,0.1);--badge-border:rgba(245,200,66,0.25);

    }
    body{background:var(--bg);color:var(--text);font-family:Georgia,serif;transition:background .3s,color .3s;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .fadein{animation:fadeIn .35s ease both}

    .pbtn:active{transform:scale(0.97);opacity:.88}
    .pbtn:disabled{opacity:.5;cursor:not-allowed}
    .sbtn{background:transparent;color:var(--accent);border:1px solid var(--card-border);border-radius:50px;padding:10px 20px;font-size:14px;font-family:Georgia,serif;cursor:pointer}
    .zinput{background:var(--input-bg);border:1px solid var(--input-border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:16px;outline:none;width:100%;font-family:Georgia,serif;transition:border-color .2s}

    .zinput::placeholder{color:var(--text3)}

    .chip{background:var(--chip-bg);border:1px solid var(--chip-border);border-radius:30px;padding:7px 15px;font-size:13px;cursor:pointer;color:var(--chip-text);display:inline-block;margin:3px;user-select:none}
    .badge{display:inline-flex;align-items:center;gap:6px;background:var(--badge-bg);border:1px solid var(--badge-border);border-radius:20px;padding:6px 13px;font-size:13px;color:var(--accent);margin:3px}

      .sidebar-bottom{padding:14px 10px;border-top:1px solid var(--card-border);display:flex;flex-direction:column;gap:8px}

      .main-content{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
      .main-topbar{padding:14px 36px;background:var(--card);border-bottom:1px solid var(--card-border);backdrop-filter:blur(14px);display:flex;justify-content:flex-end;align-items:center;gap:10px;position:sticky;top:0;z-index:40}
      .scroll-wrap{padding:32px 36px 40px;max-width:1060px;width:100%}

      /* Two-column grids */
      .home-grid{display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start}
      .learn-grid{display:grid;grid-template-columns:1fr 280px;gap:28px;align-items:start}
      .sidebar-sticky{position:sticky;top:80px}

      /* Wider content for cabinet/plans */
      .wide-content{max-width:900px}
    }
  </style>

  function useDragScroll(){
    const ref=React.useRef();
    const down=React.useRef(false);
    const startX=React.useRef(0);
    const scrollLeft=React.useRef(0);
    const onMouseDown=e=>{down.current=true;startX.current=e.pageX-ref.current.offsetLeft;scrollLeft.current=ref.current.scrollLeft;ref.current.style.cursor='grabbing';};
    const onMouseUp=()=>{down.current=false;if(ref.current)ref.current.style.cursor='grab';};
    const onMouseMove=e=>{if(!down.current||!ref.current)return;e.preventDefault();const x=e.pageX-ref.current.offsetLeft;ref.current.scrollLeft=scrollLeft.current-(x-startX.current);};
    return{ref,onMouseDown,onMouseUp,onMouseLeave:onMouseUp,onMouseMove};
  }

    React.useEffect(()=>{

          const tk=session.access_token; setToken(tk);
          tryLS(()=>{const saved=JSON.parse(localStorage.getItem("znajka_session")||"null");if(saved)localStorage.setItem("znajka_session",JSON.stringify({...saved,session}));});
        }
        if(event==="SIGNED_OUT"){setToken(null);setUser(null);setPage("auth");tryLS(()=>localStorage.removeItem("znajka_session"));}
      });
      const saved=tryLS(()=>JSON.parse(localStorage.getItem("znajka_session")));
      if(saved?.session?.refresh_token){
        sb.auth.setSession({access_token:saved.session.access_token,refresh_token:saved.session.refresh_token})
          .then(({data,error})=>{if(data?.session){setToken(data.session.access_token);tryLS(()=>localStorage.setItem("znajka_session",JSON.stringify({session:data.session,user:data.user||saved.user})));} });
      }
      return ()=>subscription.unsubscribe();
    },[]);

    React.useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);tryLS(()=>localStorage.setItem("znajka_theme",theme));},[theme]);

      trackEvent('app_open');
    },[]);

    React.useEffect(()=>{
      if(page!=="learn"||!data)return;
      const text=data.sections[secIdx].text;
      let i=0;setDisplayed("");setTypeDone(false);
      const timer=setInterval(()=>{if(i<text.length)setDisplayed(text.slice(0,++i));else{clearInterval(timer);setTypeDone(true);}},18);
      return()=>clearInterval(timer);
    },[page,secIdx,data]);

    const apiFetch=React.useCallback(async(path,opts={})=>{
      const tk=tokenRef.current;
      const headers={"Content-Type":"application/json",...(tk?{Authorization:`Bearer ${tk}`}:{}),...(opts.headers||{})};
      const res=await fetch(`${API_URL}${path}`,{...opts,headers});
      return res.json();
    },[]);

    const saveAndLogin=(session,usr)=>{const tk=session?.access_token||null;setToken(tk);setUser(usr);tryLS(()=>localStorage.setItem("znajka_session",JSON.stringify({session,user:usr})));setPage("home");};
    const logout=()=>{setToken(null);setUser(null);tryLS(()=>localStorage.removeItem("znajka_session"));setPage("auth");};
    const trackEvent=async(event,evData={})=>{try{await apiFetch("/api/analytics",{method:"POST",body:JSON.stringify({event,...evData})});}catch{}};

    const handleAuth=async()=>{
      setAuthError("");setAuthLoading(true);
      try{
        if(authMode==="register"){
          if(!authForm.name||!authForm.email||!authForm.password)throw new Error("Заполни все поля");
          let birthdate=null;
          if(authForm.day&&authForm.month&&authForm.year)birthdate=`${authForm.year}-${String(authForm.month).padStart(2,"0")}-${String(authForm.day).padStart(2,"0")}`;
          const json=await apiFetch("/api/auth/register",{method:"POST",body:JSON.stringify({name:authForm.name,email:authForm.email,password:authForm.password,birthdate,role:"student"})});
          if(!json.success)throw new Error(json.error);
          setRegisteredEmail(authForm.email);setEmailSent(true);
        }else{
          if(!authForm.email||!authForm.password)throw new Error("Введи email и пароль");
          const json=await apiFetch("/api/auth/login",{method:"POST",body:JSON.stringify({email:authForm.email,password:authForm.password})});
          if(!json.success)throw new Error(json.error);
          saveAndLogin(json.session,json.user);
        }
      }catch(err){setAuthError(err.message);}
      setAuthLoading(false);
    };

    const handleResetRequest=async()=>{

      setResetLoading(false);

    const nextSection=()=>{if(secIdx<data.sections.length-1)setSecIdx(secIdx+1);else{setPage("quiz");setQuizStep(0);setAnswers([]);setSelected(null);}};

      if(selected!==null)return;
      setSelected(idx);const correct=idx===data.quiz[quizStep].correct;const newAns=[...answers,correct];setAnswers(newAns);
      setTimeout(async()=>{
        if(quizStep<data.quiz.length-1){setQuizStep(quizStep+1);setSelected(null);}

          const fs=newAns.filter(Boolean).length;setScore(fs);

          setPage("result");

      },900);
    };
    const resetLearn=()=>{setPage("home");setTopic("");setData(null);setError(null);};

    const startListening=()=>{
      if(!voiceSupported||voiceState!=="idle")return;
      const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
      const recognition=new SR();
      recognition.lang="ru-RU";recognition.interimResults=false;recognition.maxAlternatives=1;recognition.continuous=false;
      recognitionRef.current=recognition;
      recognition.onstart=()=>setVoiceState("listening");
      recognition.onresult=async(e)=>{
        const text=e.results[0][0].transcript;setVoiceText(text);setVoiceState("thinking");
        setVoiceHistory(h=>[...h,{role:"user",text}]);
        try{
          const json=await apiFetch("/api/voice",{method:"POST",body:JSON.stringify({text,subject:subject?.name||null})});
          if(json.success){
            setVoiceAnswer(json.answer);setVoiceHistory(h=>[...h,{role:"assistant",text:json.answer}]);setVoiceState("speaking");
            if(synthRef.current){synthRef.current.cancel();const utt=new SpeechSynthesisUtterance(json.answer);utt.lang="ru-RU";utt.rate=0.95;utt.onend=()=>setVoiceState("idle");synthRef.current.speak(utt);}else setVoiceState("idle");
          }else setVoiceState("idle");
        }catch{setVoiceState("idle");}
      };
      recognition.onerror=()=>setVoiceState("idle");
      recognition.onnomatch=()=>setVoiceState("idle");
      recognition.onend=()=>{};
      recognition.start();
    };
    const stopListening=()=>{recognitionRef.current?.stop();synthRef.current?.cancel();setVoiceState("idle");};

                            ))}
                            {voiceState==="thinking"&&(
                              <div style={{padding:"12px 16px",borderRadius:16,background:"var(--card)",border:"1px solid var(--card-border)",color:"var(--text3)",fontSize:14,alignSelf:"flex-start"}}>
                                <span style={{animation:"blink 1s infinite",display:"inline-block"}}>Думаю...</span>
                              </div>
                            )}
                          </div>
                        )}
                        <div className="card" style={{padding:40,textAlign:"center",maxWidth:500}}>
                          <button
                            className={`voice-btn${voiceState==="listening"?" listening":""}${!voiceSupported?" disabled":""}`}
                            style={{margin:"0 auto 16px",display:"flex"}}
                            onClick={voiceState==="idle"?startListening:stopListening}>
                            {voiceState==="listening"?"\uD83D\uDD34":voiceState==="thinking"?"\u23F3":voiceState==="speaking"?"\uD83D\uDD0A":"\uD83C\uDF99"}
                          </button>
                          <p style={{color:"var(--text2)",fontSize:16,margin:"0 0 6px",fontWeight:600}}>
                            {voiceState==="idle"?"Нажми и говори":voiceState==="listening"?"Слушаю...":voiceState==="thinking"?"Думаю...":"Отвечаю..."}
                          </p>
                          <p style={{color:"var(--text3)",fontSize:13,margin:0}}>
                            {voiceState==="idle"?"Задай любой вопрос по теме":"Нажми ещё раз чтобы остановить"}
                          </p>
                        </div>
                        {voiceHistory.length>0&&(
                          <button className="sbtn" style={{marginTop:12}} onClick={()=>{setVoiceHistory([]);setVoiceText("");setVoiceAnswer("");}}>
                            Очистить диалог
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* HOMEWORK */}
                {page==="homework"&&(
                  <div className="fadein" style={{maxWidth:700}}>
                    <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 16px"}}>{t.hwTitle}</h2>
                    {!hwImage?(
                      <div className="photo-drop" onClick={()=>fileRef.current.click()}>
                        <div style={{fontSize:56,marginBottom:12}}>{"\uD83D\uDCF7"}</div>
                        <p style={{color:"var(--text2)",fontSize:16,margin:"0 0 6px",fontWeight:600}}>{t.hwClick}</p>
                        <p style={{color:"var(--text3)",fontSize:13,margin:0}}>Сфотографируй задание из учебника или тетради</p>
                        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
                      </div>
                    ):(
                      <div>
                        <div style={{position:"relative",marginBottom:14}}>
                          <img src={hwImage} style={{width:"100%",borderRadius:16,maxHeight:400,objectFit:"cover"}} alt="ДЗ"/>
                          <button onClick={()=>{setHwImage(null);setHwResult(null);}} style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,.55)",border:"none",borderRadius:"50%",width:32,height:32,color:"#fff",cursor:"pointer",fontSize:16}}>X</button>
                        </div>
                        {!hwResult&&(
                          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                            <button className="pbtn" style={{flex:1}} onClick={analyzeHw} disabled={hwLoading}>{hwLoading?"Анализирую...":"Разобрать задание"}</button>
                            <button className="sbtn" onClick={()=>{setHwImage(null);if(fileRef.current)fileRef.current.value="";}}>Другое фото</button>
                          </div>
                        )}
                        {hwError&&<p style={{color:"var(--red)",fontSize:13,marginTop:12}}>{hwError}</p>}
                        {hwResult&&(
                          <div className="card fadein" style={{padding:24,marginTop:14}}>
                            <h3 style={{fontFamily:"'Playfair Display',serif",color:"var(--accent)",margin:"0 0 12px",fontSize:18}}>Разбор задания</h3>
                            <div style={{fontSize:15,lineHeight:1.8,color:"var(--text2)",whiteSpace:"pre-wrap"}}>{hwResult}</div>
                            <button className="sbtn" style={{marginTop:16}} onClick={()=>{setHwImage(null);setHwResult(null);}}>Новое задание</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* CABINET */}
                {page==="cabinet"&&(
                  <div className="fadein wide-content">
                    <div className="card" style={{padding:24,marginBottom:16}}>
                      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:stats?16:0}}>
                        <div style={{width:56,height:56,borderRadius:"50%",background:"linear-gradient(135deg,var(--accent),var(--accent2))",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,color:"var(--btn-text)",fontFamily:"'Playfair Display',serif",fontWeight:700,flexShrink:0}}>
                          {user?.email?.[0]?.toUpperCase()||"?"}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"var(--text)",fontWeight:700}}>{t.myCabinet}</div>
                          <div style={{fontSize:13,color:"var(--text3)",marginTop:2}}>{user?.email}</div>
                        </div>
                        <button className="sbtn" onClick={logout}>{t.signout}</button>
                      </div>
                      {stats&&(
                        <div style={{borderTop:"1px solid var(--card-border)",paddingTop:16}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                            <span style={{fontSize:17}}>{stats.emoji} <strong style={{fontFamily:"'Playfair Display',serif",color:"var(--accent)"}}>{stats.title}</strong></span>
                            <span style={{fontSize:13,color:"var(--text3)"}}>Ур. {stats.level} - {stats.xp} XP</span>
                          </div>
                          <div className="xp-bar">
                            <div className="xp-fill" style={{width:stats.next?`${Math.min(100,(stats.xp/stats.next)*100)}%`:"100%"}}/>
                          </div>
                          {stats.next&&<p style={{fontSize:11,color:"var(--text3)",margin:"4px 0 0",textAlign:"right"}}>до след. уровня: {stats.next-stats.xp} XP</p>}
                        </div>
                      )}
                    </div>
                    {!stats?(
                      <div style={{textAlign:"center",padding:40}}>
                        <div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:36,height:36,animation:"spin .8s linear infinite",margin:"0 auto"}}/>
                      </div>
                    ):(
                      <div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                          {[{l:"Уроков",v:stats.progress.length,i:"\uD83D\uDCDA"},{l:"Наград",v:stats.achievements.length,i:"\uD83C\uDFC6"},{l:"XP",v:stats.xp,i:"\u26A1"}].map(x=>(
                            <div key={x.l} className="card" style={{padding:"16px 12px",textAlign:"center"}}>
                              <div style={{fontSize:22}}>{x.i}</div>
                              <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"var(--accent)",fontWeight:700}}>{x.v}</div>
                              <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>{x.l}</div>
                            </div>
                          ))}
                        </div>
                        {stats.achievements.length>0&&(
                          <div className="card" style={{padding:20,marginBottom:16}}>
                            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",marginBottom:10}}>{t.achievements}</div>
                            <div>{stats.achievements.map((a,i)=><span key={i} className="badge">{BADGE_ICONS[a.badge_name]||"\uD83C\uDF96"} {a.badge_name}</span>)}</div>
                          </div>
                        )}
                        {stats.progress.length>0?(
                          <div className="card" style={{padding:20}}>
                            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--text)",marginBottom:12}}>{t.passedTopics}</div>
                            {stats.progress.slice(0,15).map((p,i)=>(
                              <div key={i} className="stat-row">
                                <div style={{display:"flex",flexDirection:"column",gap:2}}>
                                  <span style={{fontSize:14,color:"var(--text2)"}}>{p.topic}</span>
                                  {p.score<3&&(
                                    <button onClick={()=>{setTopic(p.topic);setPage("loading");apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic:p.topic})}).then(json=>{if(json.success){setData({...json.data,topic:p.topic});setSecIdx(0);setPage("learn");}else setPage("cabinet");});}}
                                      style={{background:"none",border:"none",color:"var(--accent)",fontSize:11,cursor:"pointer",textAlign:"left",padding:0}}>
                                      {p.score<2?t.improve:t.repeat}
                                    </button>
                                  )}
                                </div>
                                <span style={{fontSize:13,color:p.score===3?"var(--green)":p.score>=2?"var(--accent)":"var(--red)",flexShrink:0}}>{p.score}/3 {p.score===3?"\uD83C\uDFC6":p.score>=2?"\u2B50":"\uD83D\uDCDA"}</span>
                              </div>
                            ))}
                          </div>
                        ):(
                          <div className="card" style={{padding:32,textAlign:"center"}}>
                            <div style={{fontSize:40,marginBottom:10}}>{"\uD83C\uDF31"}</div>
                            <p style={{color:"var(--text3)",fontSize:14}}>Пока нет пройденных уроков.</p>
                            <button className="pbtn" style={{marginTop:14}} onClick={()=>setPage("home")}>{t.learn} -></button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

                {/* PLANS */}
                {page==="plans"&&(
                  <div className="fadein wide-content">
                    <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"var(--accent)",margin:"0 0 6px"}}>{t.plansTitle}</h2>
                    <p style={{color:"var(--text3)",fontSize:13,margin:"0 0 20px"}}>{t.plansHint}</p>
                    {activePlan?(
                      <div>
                        <button className="sbtn" style={{marginBottom:16}} onClick={()=>setActivePlan(null)}>{t.allPlans}</button>
                        <div className="card" style={{padding:22,marginBottom:16}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                            <div>
                              <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"var(--accent)",margin:"0 0 4px"}}>{activePlan.title}</h3>
                              {activePlan.subject&&<span className="chip" style={{fontSize:11}}>{activePlan.subject}</span>}
                            </div>
                            <button onClick={()=>deletePlan(activePlan.id)} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:18}}>X</button>
                          </div>
                          {(()=>{const done=(activePlan.completed_topics||[]).length;const total=(activePlan.topics||[]).length;const pct=total>0?Math.round((done/total)*100):0;return(
                            <div>
                              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"var(--text3)",marginBottom:6}}>
                                <span>{t.progress}</span><span style={{color:"var(--accent)",fontWeight:700}}>{done}/{total} - {pct}%</span>
                              </div>
                              <div style={{height:8,background:"var(--progress-bg)",borderRadius:4}}>
                                <div style={{height:"100%",background:"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${pct}%`,borderRadius:4,transition:"width .5s"}}/>
                              </div>
                            </div>
                          );})()}
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
                          {(activePlan.topics||[]).map((tp,i)=>{
                            const done=(activePlan.completed_topics||[]).includes(tp.title);
                            return(
                              <div key={i} className="card" style={{padding:18,opacity:done?0.7:1,borderLeft:`3px solid ${done?"var(--green)":"var(--card-border)"}`}}>
                                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                                  <div style={{width:34,height:34,borderRadius:"50%",background:done?"var(--green)":"var(--progress-bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                                    {done?"\u2713":tp.emoji}
                                  </div>
                                  <div style={{flex:1,minWidth:0}}>
                                    <p style={{fontSize:14,color:done?"var(--text3)":"var(--text)",margin:"0 0 3px",fontWeight:600,textDecoration:done?"line-through":"none"}}>{tp.title}</p>
                                    <p style={{fontSize:12,color:"var(--text3)",margin:"0 0 10px"}}>{tp.description}</p>
                                    <div style={{display:"flex",gap:6}}>
                                      {!done&&(
                                        <button className="pbtn" style={{padding:"6px 12px",fontSize:12}}
                                          onClick={()=>{setTopic(tp.title);setPage("loading");apiFetch("/api/explain",{method:"POST",body:JSON.stringify({topic:tp.title,subject:activePlan.subject})}).then(json=>{if(json.success){setData({...json.data,topic:tp.title});setSecIdx(0);setPage("learn");}});}}>
                                          Учить ->
                                        </button>
                                      )}
                                      <button onClick={()=>completeTopic(activePlan.id,tp.title)}
                                        style={{background:"none",border:`1px solid ${done?"var(--red)":"var(--green)"}`,borderRadius:20,padding:"5px 10px",fontSize:11,cursor:"pointer",color:done?"var(--red)":"var(--green)"}}>
                                        {done?t.undone:t.markDone}
                                      </button>
                                    </div>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    ):(
                      <div>
                        <div className="card" style={{padding:22,marginBottom:20}}>
                          <p style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"var(--text)",margin:"0 0 12px"}}>{t.newPlan}</p>
                          <div style={{marginBottom:12}}>
                            <p style={{fontSize:11,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1,margin:"0 0 8px"}}>{t.subject}</p>
                            <div className="drag-scroll" {...planScroll} ref={planScroll.ref}>
                              <button className={`subject-pill${!subject?" active":""}`} onClick={()=>setSubject(null)}>Любой</button>
                              {SUBJECTS.map(s=><button key={s.id} className={`subject-pill${subject?.id===s.id?" active":""}`} onClick={()=>setSubject(s)}>{s.emoji} {s.name}</button>)}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:8}}>
                            <input className="zinput" placeholder='Например: "Алгебра" или "Английские времена"'
                              value={planTopic} onChange={e=>setPlanTopic(e.target.value)}
                              onKeyDown={e=>e.key==="Enter"&&createPlan()} style={{flex:1}}/>
                            <button className="pbtn" style={{padding:"13px 20px",flexShrink:0}} onClick={createPlan} disabled={planLoading}>{planLoading?"...":"->"}</button>
                          </div>
                          {planError&&<p style={{color:"var(--red)",fontSize:13,marginTop:8}}>{planError}</p>}
                        </div>
                        {plans===null?(
                          <div style={{textAlign:"center",padding:30}}><div style={{border:"3px solid var(--progress-bg)",borderTopColor:"var(--accent)",borderRadius:"50%",width:36,height:36,animation:"spin .8s linear infinite",margin:"0 auto"}}/></div>
                        ):plans.length===0?(
                          <div className="card" style={{padding:32,textAlign:"center"}}>
                            <p style={{fontSize:40,margin:"0 0 10px"}}>{"\uD83D\uDDFA"}</p>
                            <p style={{color:"var(--text3)",fontSize:14}}>Создай первый план - получи roadmap по любой теме!</p>
                          </div>
                        ):(
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
                            {plans.map(plan=>{
                              const done=(plan.completed_topics||[]).length;const total=(plan.topics||[]).length;const pct=total>0?Math.round((done/total)*100):0;
                              return(
                                <div key={plan.id} className="card fadein" style={{padding:20,cursor:"pointer"}} onClick={()=>setActivePlan(plan)}>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                                    <div>
                                      <p style={{fontFamily:"'Playfair Display',serif",fontSize:16,color:"var(--text)",margin:"0 0 3px"}}>{plan.title}</p>
                                      <p style={{fontSize:12,color:"var(--text3)",margin:0}}>{plan.subject||"Общее"} - {total} тем</p>
                                    </div>
                                    <span style={{fontSize:20,fontWeight:700,color:pct===100?"var(--green)":"var(--accent)"}}>{pct}%</span>
                                  </div>
                                  <div style={{height:6,background:"var(--progress-bg)",borderRadius:3}}>
                                    <div style={{height:"100%",background:pct===100?"var(--green)":"linear-gradient(90deg,var(--accent),var(--accent2))",width:`${pct}%`,borderRadius:3,transition:"width .5s"}}/>
                                  </div>
                                  <p style={{fontSize:11,color:"var(--text3)",margin:"6px 0 0"}}>{done}/{total} выполнено</p>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}

              </div>{/* end scroll-wrap */}
            </div>{/* end main-content */}
          </div>
        )}

        {/* Mobile bottom nav */}
        {!isAuthPage&&(
          <nav className="bottom-nav">
            {getNavItems(t).map(item=>(
              <button key={item.id} className={`nav-item${page===item.id?" active":""}`}
                onClick={()=>{setPage(item.id);if(item.id==="cabinet")loadStats();if(item.id==="parent"){loadChildren();loadSubscription();}if(item.id==="plans")loadPlans();}}>
                <span>{item.icon}</span>
                <span>{item.label}</span>
              </button>
            ))}
          </nav>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
